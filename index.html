<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Weekly Invoice Tracker – Pedro</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f0f0f; color: #f0f0f0; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; padding: 20px; }
  .wrap { max-width: 640px; margin: 0 auto; }
  /* Header */
  .eyebrow { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #f5a623; font-weight: 700; margin-bottom: 6px; }
  h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
  .subtitle { color: #888; font-size: 13px; margin-top: 4px; margin-bottom: 28px; }
  /* Tabs */
  .tabs { display: flex; gap: 4px; background: #1a1a1a; border-radius: 8px; padding: 4px; margin-bottom: 24px; }
  .tab { flex: 1; padding: 9px 0; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; background: transparent; color: #888; transition: all .15s; }
  .tab.active { background: #f5a623; color: #000; font-weight: 800; }
  /* Cards */
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
  /* Summary bar */
  .summary { display: flex; gap: 32px; }
  .summary-label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #888; display: block; margin-bottom: 4px; }
  .summary-val { font-size: 22px; font-weight: 800; }
  /* Form */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; }
  label { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #888; margin-bottom: 6px; }
  input { background: #111; border: 1px solid #2a2a2a; border-radius: 6px; color: #f0f0f0; padding: 10px 12px; font-size: 14px; width: 100%; font-family: inherit; outline: none; }
  input:focus { border-color: #f5a623; }
  .label-note { font-size: 10px; color: #666; font-weight: 400; letter-spacing: 0; text-transform: none; }
  /* Buttons */
  .btn-primary { background: #f5a623; color: #000; border: none; border-radius: 6px; padding: 11px 22px; font-weight: 800; font-size: 14px; cursor: pointer; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: #888; border: 1px solid #2a2a2a; border-radius: 6px; padding: 10px 18px; font-weight: 600; font-size: 13px; cursor: pointer; }
  .btn-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  /* Alerts */
  .alert { padding: 8px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 12px; }
  .alert-error { background: #2d1010; border: 1px solid #e05555; color: #e05555; }
  .alert-success { background: #0e2018; border: 1px solid #4caf7d; color: #4caf7d; }
  /* Entry list */
  .entries-header { padding: 14px 20px; border-bottom: 1px solid #2a2a2a; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #888; }
  .entry { padding: 13px 20px; border-bottom: 1px solid #2a2a2a; display: flex; justify-content: space-between; align-items: center; }
  .entry-date { font-weight: 700; font-size: 14px; }
  .entry-date span { color: #888; font-weight: 400; }
  .entry-meta { font-size: 12px; color: #888; margin-top: 3px; }
  .entry-ot { font-size: 11px; color: #f5a623; margin-top: 2px; }
  .entry-sat { color: #f5a623; margin-left: 6px; }
  .entry-right { display: flex; align-items: center; gap: 16px; }
  .entry-amount { font-weight: 800; font-size: 15px; text-align: right; }
  .entry-hours { font-size: 11px; color: #888; }
  .btn-remove { background: none; border: none; color: #e05555; cursor: pointer; font-size: 20px; padding: 0 4px; line-height: 1; }
  /* Invoice settings */
  .settings-title { font-size: 13px; font-weight: 700; color: #f5a623; margin-bottom: 16px; }
  /* Preview */
  .preview-actions { display: flex; gap: 10px; margin-bottom: 16px; }
  .preview-frame-wrap { border-radius: 10px; overflow: hidden; border: 1px solid #2a2a2a; }
  iframe { width: 100%; height: 700px; border: none; background: #fff; display: block; }
  .preview-hint { color: #888; font-size: 12px; margin-top: 12px; text-align: center; }
  .empty { text-align: center; padding: 60px 20px; color: #888; }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } .summary { gap: 20px; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Weekly Invoice</div>
  <h1>Pedro Henrique Ortiz Costa</h1>
  <p class="subtitle">Log your hours. Generate your invoice.</p>

  <div class="tabs">
    <button class="tab active" id="tab-log" onclick="switchTab('log')">Log Hours</button>
    <button class="tab" id="tab-preview" onclick="switchTab('preview')">Invoice Preview</button>
  </div>

  <!-- LOG TAB -->
  <div id="pane-log">
    <!-- Summary -->
    <div class="card">
      <div class="summary">
        <div><span class="summary-label">This week</span><span class="summary-val" id="s-total">$0.00</span></div>
        <div><span class="summary-label">Total hours</span><span class="summary-val" id="s-hours">0h</span></div>
        <div><span class="summary-label">Days logged</span><span class="summary-val" id="s-days">0</span></div>
      </div>
    </div>

    <!-- Input form -->
    <div class="card">
      <div class="settings-title">Add Today's Hours</div>
      <div class="form-row">
        <div class="form-group">
          <label>Time Range</label>
          <input id="inp-time" placeholder="7am - 3pm" onkeydown="if(event.key==='Enter') addEntry()"/>
        </div>
        <div class="form-group">
          <label>Location</label>
          <input id="inp-loc" placeholder="West Lakes" onkeydown="if(event.key==='Enter') addEntry()"/>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label>Date <span class="label-note" id="today-hint"></span></label>
        <input id="inp-date" placeholder="DD/MM" style="width:50%" onkeydown="if(event.key==='Enter') addEntry()"/>
      </div>
      <div id="alert-box"></div>
      <button class="btn-primary" onclick="addEntry()">Add Entry</button>
    </div>

    <!-- Entry list -->
    <div class="card" id="entry-list-card" style="padding:0;display:none;">
      <div class="entries-header">Logged Days</div>
      <div id="entry-list"></div>
    </div>

    <!-- Invoice settings -->
    <div class="card">
      <div class="settings-title">Invoice Settings</div>
      <div class="form-row">
        <div class="form-group">
          <label>Invoice #</label>
          <input id="inp-inv" type="number" value="14" oninput="saveMeta()"/>
        </div>
        <div class="form-group">
          <label>Week Range <span class="label-note">(optional)</span></label>
          <input id="inp-range" placeholder="e.g. 16/06 to 20/06" oninput="saveMeta()"/>
        </div>
      </div>
    </div>

    <div class="btn-actions">
      <button class="btn-primary" id="btn-gen" onclick="generatePreview()" disabled>Generate Invoice PDF</button>
      <button class="btn-ghost" onclick="newWeek()">New Week</button>
    </div>
  </div>

  <!-- PREVIEW TAB -->
  <div id="pane-preview" style="display:none">
    <div id="preview-content">
      <div class="empty"><div class="empty-icon">📋</div><p>No invoice generated yet.</p><button class="btn-ghost" style="margin-top:16px" onclick="switchTab('log')">← Go log your hours</button></div>
    </div>
  </div>
</div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const MY = {
  name: "Pedro Henrique Ortiz Costa",
  abn: "37 417 595 702",
  address: "Unit 18, 1A Stephens Avenue, Torrensville 5031, SA, Australia",
  phone: "0449 979 834",
  email: "pedrohenriqueortizcosta@gmail.com",
  bsb: "062-948",
  account: "35751781",
  bank: "Commonwealth Bank",
};
const CLIENT = { name: "Nightingale Construction Services", email: "admin@nightingalecs.net.au", phone: "+61 423 510 070" };
const RATE_STD = 40, RATE_OT = 60, STD_HOURS = 8;
const WEEKDAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const STORAGE_ENTRIES = "phoc_entries";
const STORAGE_META    = "phoc_meta";

// ── State ──────────────────────────────────────────────────────────────────
let entries = [];
let previewHtml = null;

// ── Persist ────────────────────────────────────────────────────────────────
function loadData() {
  try { entries = JSON.parse(localStorage.getItem(STORAGE_ENTRIES) || "[]"); } catch(e) { entries = []; }
  try {
    const m = JSON.parse(localStorage.getItem(STORAGE_META) || "{}");
    if (m.invoiceNumber) document.getElementById("inp-inv").value = m.invoiceNumber;
    if (m.weekRange)     document.getElementById("inp-range").value = m.weekRange;
  } catch(e) {}
}

function saveEntries() {
  localStorage.setItem(STORAGE_ENTRIES, JSON.stringify(entries));
}

function saveMeta() {
  localStorage.setItem(STORAGE_META, JSON.stringify({
    invoiceNumber: Number(document.getElementById("inp-inv").value),
    weekRange: document.getElementById("inp-range").value,
  }));
}

// ── Time Helpers ───────────────────────────────────────────────────────────
function parseTime(str) {
  str = str.trim().toLowerCase().replace(/\s/g,"");
  let ampm = null;
  if (str.endsWith("am")) { ampm="am"; str=str.slice(0,-2); }
  else if (str.endsWith("pm")) { ampm="pm"; str=str.slice(0,-2); }
  let h, m;
  if (str.includes(":")) { [h,m] = str.split(":").map(Number); }
  else { h=Number(str); m=0; }
  if (isNaN(h)||isNaN(m)) return null;
  if (ampm==="pm" && h!==12) h+=12;
  if (ampm==="am" && h===12) h=0;
  return h + m/60;
}

function fmtDecimal(d) {
  const h=Math.floor(d), m=Math.round((d-h)*60);
  return m>0 ? `${h}h ${m}m` : `${h}h`;
}

function fmtTime12(d) {
  let h=Math.floor(d); const m=Math.round((d-h)*60);
  const ap=h>=12?"pm":"am";
  if(h>12) h-=12; if(h===0) h=12;
  return `${h}:${String(m).padStart(2,"0")}${ap}`;
}

function calcEarnings(s, e, isSat) {
  const total=e-s;
  if(total<=0) return null;
  if(isSat) return { std:0, ot:total, stdAmt:0, otAmt:total*RATE_OT, total:total*RATE_OT, hours:total };
  const std=Math.min(total,STD_HOURS), ot=Math.max(0,total-STD_HOURS);
  return { std, ot, stdAmt:std*RATE_STD, otAmt:ot*RATE_OT, total:std*RATE_STD+ot*RATE_OT, hours:total };
}

function getWeekday(dateStr) {
  const p=dateStr.split("/");
  const d=parseInt(p[0]), mo=parseInt(p[1])-1, yr=p[2]?parseInt(p[2]):new Date().getFullYear();
  return WEEKDAYS[new Date(yr,mo,d).getDay()];
}

function isSat(dateStr) { return getWeekday(dateStr)==="Sat"; }
function fmtInvNum(n) { return `INV${String(n).padStart(3,"0")}`; }

function todayStr() {
  const d=new Date();
  return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`;
}

// ── UI ─────────────────────────────────────────────────────────────────────
function switchTab(t) {
  document.getElementById("pane-log").style.display     = t==="log"     ? "" : "none";
  document.getElementById("pane-preview").style.display = t==="preview" ? "" : "none";
  document.getElementById("tab-log").className     = "tab" + (t==="log"     ? " active" : "");
  document.getElementById("tab-preview").className = "tab" + (t==="preview" ? " active" : "");
}

function showAlert(msg, type) {
  const box=document.getElementById("alert-box");
  box.innerHTML = msg ? `<div class="alert alert-${type}">${msg}</div>` : "";
  if(type==="success") setTimeout(()=>{ box.innerHTML=""; }, 3000);
}

function updateSummary() {
  let gt=0, th=0;
  entries.forEach(e=>{
    const c=calcEarnings(e.s,e.e,isSat(e.date));
    if(c){ gt+=c.total; th+=c.hours; }
  });
  document.getElementById("s-total").textContent = `$${gt.toFixed(2)}`;
  document.getElementById("s-hours").textContent = th>0 ? fmtDecimal(th) : "0h";
  document.getElementById("s-days").textContent  = entries.length;
  document.getElementById("btn-gen").disabled = entries.length===0;
}

function renderEntries() {
  const list=document.getElementById("entry-list");
  const card=document.getElementById("entry-list-card");
  if(!entries.length){ card.style.display="none"; list.innerHTML=""; return; }
  card.style.display="";
  list.innerHTML = entries.map(en=>{
    const sat=isSat(en.date);
    const c=calcEarnings(en.s,en.e,sat);
    const wd=getWeekday(en.date);
    const otTag = c && c.ot>0 && !sat ? `<div class="entry-ot">+${fmtDecimal(c.ot)} OT @ $60/hr</div>` : "";
    const satTag = sat ? `<span class="entry-sat">Saturday</span>` : "";
    return `<div class="entry">
      <div>
        <div class="entry-date">${en.date} <span>${wd}.</span></div>
        <div class="entry-meta">${fmtTime12(en.s)} – ${fmtTime12(en.e)} · ${en.loc}${satTag}</div>
        ${otTag}
      </div>
      <div class="entry-right">
        <div><div class="entry-amount">$${c?c.total.toFixed(2):"0.00"}</div><div class="entry-hours">${c?fmtDecimal(c.hours):""}</div></div>
        <button class="btn-remove" onclick="removeEntry('${en.date}')">×</button>
      </div>
    </div>`;
  }).join("");
}

function refresh() { renderEntries(); updateSummary(); }

// ── Actions ────────────────────────────────────────────────────────────────
function addEntry() {
  showAlert("","");
  const timeRaw = document.getElementById("inp-time").value.trim();
  const loc     = document.getElementById("inp-loc").value.trim();
  const dateRaw = document.getElementById("inp-date").value.trim();

  if(!timeRaw) { showAlert("Enter a time range, e.g. 7am - 3pm","error"); return; }
  if(!loc)     { showAlert("Enter a location, e.g. West Lakes","error"); return; }

  const parts = timeRaw.split(/[-–—]|(\bto\b)/i).filter(x=>x&&x.trim()&&x.trim()!=="to").map(s=>s.trim());
  if(parts.length<2) { showAlert("Format: 7am - 3pm or 7:00 - 15:00","error"); return; }

  const s=parseTime(parts[0]), e=parseTime(parts[1]);
  if(s===null||e===null) { showAlert("Couldn't parse times — try 7:00am - 3:00pm","error"); return; }
  if(e<=s) { showAlert("End time must be after start time","error"); return; }

  const date = dateRaw || todayStr();
  if(!/^\d{1,2}\/\d{1,2}(\/\d{4})?$/.test(date)) { showAlert("Date format: DD/MM or DD/MM/YYYY","error"); return; }
  if(entries.find(en=>en.date===date)) { showAlert(`Already have an entry for ${date}. Remove it first.`,"error"); return; }

  entries.push({ date, s, e, loc });
  entries.sort((a,b)=>{
    const [ad,am]=a.date.split("/").map(Number), [bd,bm]=b.date.split("/").map(Number);
    return am!==bm ? am-bm : ad-bd;
  });
  saveEntries();
  refresh();

  document.getElementById("inp-time").value="";
  document.getElementById("inp-loc").value="";
  document.getElementById("inp-date").value="";
  showAlert(`Added ${date} ${getWeekday(date)}.`,"success");
}

function removeEntry(date) {
  entries = entries.filter(e=>e.date!==date);
  saveEntries();
  refresh();
}

function newWeek() {
  if(!confirm("Clear all entries and start a new week?")) return;
  entries=[];
  saveEntries();
  const n=Number(document.getElementById("inp-inv").value)+1;
  document.getElementById("inp-inv").value=n;
  document.getElementById("inp-range").value="";
  saveMeta();
  previewHtml=null;
  document.getElementById("preview-content").innerHTML=`<div class="empty"><div class="empty-icon">📋</div><p>No invoice generated yet.</p><button class="btn-ghost" style="margin-top:16px" onclick="switchTab('log')">← Go log your hours</button></div>`;
  refresh();
  switchTab("log");
}

// ── PDF / Print ────────────────────────────────────────────────────────────
function generatePreview() {
  if(!entries.length) return;
  const invNum = Number(document.getElementById("inp-inv").value);
  const first  = entries[0].date, last=entries[entries.length-1].date;
  const range  = document.getElementById("inp-range").value || `${first} to ${last}`;
  document.getElementById("inp-range").value = range;
  saveMeta();
  previewHtml = buildInvoiceHTML(entries, invNum, range);
  document.getElementById("preview-content").innerHTML = `
    <div class="preview-actions">
      <button class="btn-primary" onclick="openPrint()">Print / Save as PDF</button>
      <button class="btn-ghost" onclick="switchTab('log')">← Back</button>
    </div>
    <div class="preview-frame-wrap">
      <iframe id="inv-frame" srcdoc="" title="Invoice Preview"></iframe>
    </div>
    <p class="preview-hint">Tap "Print / Save as PDF" → Share → Save to Files</p>`;
  document.getElementById("inv-frame").srcdoc = previewHtml;
  switchTab("preview");
}

function openPrint() {
  // iOS Safari blocks window.open — use a print overlay instead
  const overlay = document.createElement("div");
  overlay.id = "print-overlay";
  overlay.style.cssText = "position:fixed;inset:0;z-index:9999;background:#fff;overflow:auto;";
  overlay.innerHTML = previewHtml.replace(/<\/body>/, `
    <div style="position:fixed;bottom:24px;right:24px;display:flex;gap:10px;z-index:99999">
      <button onclick="window.print()" style="background:#1a1a1a;color:#fff;border:none;border-radius:8px;padding:14px 24px;font-size:15px;font-weight:700;cursor:pointer;">🖨 Print / Save PDF</button>
      <button onclick="document.getElementById('print-overlay').remove()" style="background:#eee;color:#333;border:none;border-radius:8px;padding:14px 20px;font-size:15px;font-weight:700;cursor:pointer;">✕ Close</button>
    </div>
    <style>@page{margin:15mm} @media print { button { display:none!important; } }</style>
  </body>`);
  document.body.appendChild(overlay);
}

function buildInvoiceHTML(entries, invNum, range) {
  let totalStd=0, totalOT=0, totalStdAmt=0, totalOTAmt=0, gt=0, th=0;
  entries.forEach(en=>{
    const c=calcEarnings(en.s,en.e,isSat(en.date));
    if(!c) return;
    totalStd+=c.std; totalOT+=c.ot;
    totalStdAmt+=c.stdAmt; totalOTAmt+=c.otAmt;
    gt+=c.total; th+=c.hours;
  });

  const dateStr = new Date().toLocaleDateString("en-AU",{day:"2-digit",month:"2-digit",year:"numeric"});
  const rows = entries.map(en=>{
    const wd=getWeekday(en.date);
    const sat=isSat(en.date);
    return `<tr><td>${en.date} ${wd}.</td><td>${fmtTime12(en.s)} – ${fmtTime12(en.e)}</td><td>${en.loc}</td><td>${sat?"Saturday rate ($60/hr)":"Standard ($40/hr)"}</td></tr>`;
  }).join("");

  const stdRow  = totalStd>0  ? `<tr><td class="lb">Standard hours (${fmtDecimal(totalStd)} × $${RATE_STD}/hr)</td><td class="am">$${totalStdAmt.toFixed(2)}</td></tr>` : "";
  const otRow   = totalOT>0   ? `<tr><td class="lb">Overtime / Saturday (${fmtDecimal(totalOT)} × $${RATE_OT}/hr)</td><td class="am">$${totalOTAmt.toFixed(2)}</td></tr>` : "";

  return `<!DOCTYPE html><html><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tax Invoice ${fmtInvNum(invNum)}</title>

.brand h1{font-size:20px;font-weight:800;letter-spacing:-0.5px}
.brand p{color:#555;font-size:11px;margin-top:2px;line-height:1.5}

<div class="hdr">
  <div class="brand">
    <h1>${MY.name}</h1>
    <p>ABN: ${MY.abn}</p>
    <p>${MY.address}</p>
    <p>${MY.phone} · ${MY.email}</p>
  </div>
  <div class="badge">Tax Invoice</div>
</div>
<div class="meta">
  <div><div class="ml">Invoice Number</div><div class="mv">${fmtInvNum(invNum)}</div></div>
  <div><div class="ml">Balance Due</div><div class="mv big">$${gt.toFixed(2)} AUD</div></div>
  <div><div class="ml">Date</div><div class="mv">${dateStr}</div></div>
  <div><div class="ml">Due Date</div><div class="mv">On Receipt</div></div>
</div>
<div class="two">
  <div class="info">
    <div class="sec-label">Bill To</div>
    <p><strong>${CLIENT.name}</strong></p>
    <p>${CLIENT.email}</p>
    <p>${CLIENT.phone}</p>
  </div>
  <div class="info">
    <div class="sec-label">Period</div>
    <p style="font-size:16px;font-weight:700;margin-bottom:6px">${range}</p>
    <p>Total Hours: <strong>${fmtDecimal(th)}</strong></p>
  </div>
</div>
<div class="sec-label" style="margin-bottom:10px">Days Worked</div>
<table><thead><tr><th>Date</th><th>Hours</th><th>Location</th><th>Rate</th></tr></thead><tbody>${rows}</tbody></table>
<div class="sec-label" style="margin-bottom:10px">Summary</div>
<table class="sum"><tbody>${stdRow}${otRow}<tr class="tot"><td>Total</td><td class="am">$${gt.toFixed(2)} AUD</td></tr></tbody></table>
<div class="paybox">
  <h3>Payment Instructions</h3>
  <div class="paygrid">
    <div><div class="pl">BSB</div><div class="pv">${MY.bsb}</div></div>
    <div><div class="pl">Account Number</div><div class="pv">${MY.account}</div></div>
    <div><div class="pl">Bank</div><div class="pv">${MY.bank}</div></div>
    <div><div class="pl">Account Name</div><div class="pv">${MY.name}</div></div>
  </div>
</div>
<div class="foot">Thank you for the opportunity to work with ${CLIENT.name}.</div>
</body></html>`;
}

// ── Init ───────────────────────────────────────────────────────────────────
loadData();
document.getElementById("today-hint").textContent = `(leave blank for today · ${todayStr()})`;
refresh();
</script>
</body>
</html>
